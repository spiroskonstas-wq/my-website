<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multi-Currency Expense Tracker (CAD)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; padding: 20px; max-width: 1000px; margin: auto; }

.header {
display: flex;
align-items: center;
gap: 20px;
margin-bottom: 25px;
}

.header img {
max-width: 150px;
height: auto;
border-radius: 8px;
box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

table { border-collapse: collapse; width: 100%; margin-top: 20px; }

th, td {
border: 1px solid #ccc;
padding: 8px;
text-align: left;
}

th { background: #f4f4f4; }

input, select {
padding: 6px;
margin-right: 10px;
margin-bottom: 10px;
}

button {
padding: 6px 12px;
margin-right: 10px;
cursor: pointer;
}

.totals {
font-weight: bold;
font-size: 18px;
margin-top: 15px;
}

.receipt-preview{
width:60px;
}
</style>
</head>

<body>

<div class="header">
<img src="https://www.flyingtigerssurplus.com/product-images/xxlg/P7775.jpg">
<h2>Multi-Currency Expense Tracker (CAD)</h2>
</div>

<input type="text" id="trip" placeholder="Trip Number">
<input type="text" id="desc" placeholder="Description">
<input type="number" id="amount" placeholder="Amount" step="0.01">

<select id="currency">
<option value="CAD">CAD</option>
<option value="USD">USD</option>
<option value="EUR">EUR</option>
<option value="GBP">GBP</option>
<option value="MXN">MXN</option>
<option value="CZK">CZK</option>
<option value="JPY">JPY</option>
<option value="AUD">AUD</option>
<option value="CHF">CHF</option>
<option value="INR">INR</option>
</select>

<br>

<input type="file" id="receipt" accept="image/jpeg,image/png,image/webp,image/heic,image/heif">

<br>

<input type="number" id="days" placeholder="Number of Days" min="0" oninput="updateDaysTotal()">

<br>

<button onclick="addExpense()">Add Expense</button>
<button onclick="exportToPDF()">Export to PDF</button>

<table>
<thead>
<tr>
<th>Trip #</th>
<th>Description</th>
<th>Amount</th>
<th>Currency</th>
<th>Amount CAD</th>
<th>Receipt</th>
</tr>
</thead>

<tbody id="expenseTable"></tbody>
</table>

<div class="totals" id="totalExpenses">Total Expenses in CAD: $0.00</div>
<div class="totals" id="daysTotal">Days Total (800 CAD/day): $0.00</div>
<div class="totals" id="grandTotal">Grand Total in CAD: $0.00</div>

<script>

let totalCAD = 0;
let totalDaysCAD = 0;
let expenses = [];

function resizeImage(base64, maxWidth = 1000) {
    return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement("canvas");
            const scale = maxWidth / img.width;
            canvas.width = maxWidth;
            canvas.height = img.height * scale;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img,0,0,canvas.width,canvas.height);
            resolve(canvas.toDataURL("image/jpeg",0.7));
        };
        img.src = base64;
    });
}

async function addExpense(){

const trip = document.getElementById("trip").value.trim();
const desc = document.getElementById("desc").value.trim();
const amount = parseFloat(document.getElementById("amount").value);
const currency = document.getElementById("currency").value;
const receiptFile = document.getElementById("receipt").files[0];

if(!trip || !desc || isNaN(amount)){
alert("Please enter trip number, description and valid amount.");
return;
}

let rate = 1;

try{
if(currency !== "CAD"){
const response = await fetch(`https://open.er-api.com/v6/latest/${currency}`);
const data = await response.json();
if(data.result === "success" && data.rates["CAD"]){
rate = data.rates["CAD"];
}else{
throw new Error();
}
}

const amountCAD = amount * rate;

let receiptData = null;
if(receiptFile){
receiptData = await new Promise((resolve,reject)=>{
const reader = new FileReader();
reader.onload = e => resolve(e.target.result);
reader.onerror = err => reject(err);
reader.readAsDataURL(receiptFile);
});
receiptData = await resizeImage(receiptData);
}

totalCAD += amountCAD;

expenses.push({
trip,
desc,
amount,
currency,
amountCAD,
receipt: receiptData
});

addRow(trip,desc,amount,currency,amountCAD,receiptData);

document.getElementById("totalExpenses").innerText =
"Total Expenses in CAD: $" + totalCAD.toFixed(2);

updateGrandTotal();

document.getElementById("desc").value="";
document.getElementById("amount").value="";
document.getElementById("receipt").value="";

}catch(error){
alert("Could not fetch exchange rate.");
}

}

function addRow(trip,desc,amount,currency,amountCAD,receipt){
const preview = receipt ? `<img src="${receipt}" class="receipt-preview">` : "";
const row = `
<tr>
<td>${trip}</td>
<td>${desc}</td>
<td>${amount.toFixed(2)}</td>
<td>${currency}</td>
<td>${amountCAD.toFixed(2)}</td>
<td>${preview}</td>
</tr>
`;
document.getElementById("expenseTable").innerHTML += row;
}

function updateDaysTotal(){
const days = parseFloat(document.getElementById("days").value) || 0;
totalDaysCAD = days * 800;
document.getElementById("daysTotal").innerText =
"Days Total (800 CAD/day): $" + totalDaysCAD.toFixed(2);
updateGrandTotal();
}

function updateGrandTotal(){
const grandTotal = totalCAD + totalDaysCAD;
document.getElementById("grandTotal").innerText =
"Grand Total in CAD: $" + grandTotal.toFixed(2);
}

function exportToPDF(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();
let y=10;
doc.setFontSize(16);
doc.text("Expense Report",10,y);
y+=10;

expenses.forEach(exp=>{
doc.setFontSize(12);
doc.text(`Trip: ${exp.trip}`,10,y); y+=6;
doc.text(`Description: ${exp.desc}`,10,y); y+=6;
doc.text(`Amount: ${exp.amount} ${exp.currency}`,10,y); y+=6;
doc.text(`CAD: ${exp.amountCAD.toFixed(2)}`,10,y); y+=10;

if(exp.receipt){
const img = new Image();
img.src = exp.receipt;
const maxWidth = 180; // max width in PDF units
const ratio = img.height / img.width;
const width = maxWidth;
const height = width * ratio;

doc.addImage(exp.receipt,"JPEG",10,y,width,height,undefined,"FAST");
y += height + 10;
}

if(y>250){doc.addPage(); y=10;}
});

doc.text(`Total Expenses CAD: ${totalCAD.toFixed(2)}`,10,y+10);
doc.text(`Days Total: ${totalDaysCAD.toFixed(2)}`,10,y+20);
doc.text(`Grand Total: ${(totalCAD+totalDaysCAD).toFixed(2)}`,10,y+30);

doc.save("Expenses_Report.pdf");
}

</script>

</body>
</html>
