<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Currency Expense Tracker (CAD)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;padding:20px;max-width:1000px;margin:auto;}
.header{display:flex;align-items:center;gap:20px;margin-bottom:25px;flex-wrap:wrap;}
.header img{max-width:150px;border-radius:8px;box-shadow:0 4px 10px rgba(0,0,0,0.2);}
table{border-collapse:collapse;width:100%;margin-top:20px;}
th,td{border:1px solid #ccc;padding:8px;text-align:left;}
th{background:#f4f4f4;}
input,select,button{padding:8px;margin-bottom:10px;width:100%;box-sizing:border-box;}
button{cursor:pointer;}
.totals{font-weight:bold;font-size:18px;margin-top:15px;}
.receipt-preview{width:60px;cursor:pointer;}
.button-container{display:flex;flex-wrap:wrap;gap:10px;}
.delete-btn{background:#c62828;color:white;border:none;padding:6px 10px;border-radius:4px;}
#receiptModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;z-index:1000;}
#receiptModal img{max-width:90%;max-height:90%;}
@media (max-width:700px){
table,thead,tbody,th,td,tr{display:block;width:100%;}
thead{display:none;}
tr{border:1px solid #ccc;margin-bottom:10px;padding:10px;border-radius:6px;background:#fafafa;}
td{border:none;padding:6px 0;}
td::before{font-weight:bold;display:block;}
td:nth-child(1)::before{content:"Trip #";}
td:nth-child(2)::before{content:"Date";}
td:nth-child(3)::before{content:"Description";}
td:nth-child(4)::before{content:"Amount";}
td:nth-child(5)::before{content:"Currency";}
td:nth-child(6)::before{content:"Base Rate";}
td:nth-child(7)::before{content:"Rate with Markup";}
td:nth-child(8)::before{content:"Amount CAD";}
td:nth-child(9)::before{content:"Receipt";}
td:nth-child(10)::before{content:"Action";}
}
</style>
</head>

<body>

<div class="header">
<img src="https://www.flyingtigerssurplus.com/product-images/xxlg/P7775.jpg">
<h2>Multi-Currency Expense Tracker (CAD)</h2>
</div>

<input type="text" id="trip" placeholder="Trip Number">
<input type="date" id="date">
<input type="text" id="desc" placeholder="Description">
<input type="number" id="amount" placeholder="Amount" step="0.01">

<select id="currency">
<option value="CAD">CAD</option>
<option value="USD">USD</option>
<option value="EUR">EUR</option>
<option value="GBP">GBP</option>
<option value="MXN">MXN</option>
<option value="CZK">CZK</option>
<option value="JPY">JPY</option>
<option value="AUD">AUD</option>
<option value="CHF">CHF</option>
<option value="INR">INR</option>
</select>

<input type="file" id="receipt" accept="image/*">

<div class="button-container">
<button onclick="addExpense()">Add Expense</button>
<button onclick="exportToPDF()">Export to PDF</button>
<input type="number" id="days" placeholder="Number of Days" min="0" oninput="updateDaysTotal()">
</div>

<table>
<thead>
<tr>
<th>Trip #</th>
<th>Date</th>
<th>Description</th>
<th>Amount</th>
<th>Currency</th>
<th>Base Rate</th>
<th>Rate with Markup</th>
<th>Amount CAD</th>
<th>Receipt</th>
<th>Action</th>
</tr>
</thead>
<tbody id="expenseTable"></tbody>
</table>

<div class="totals" id="totalExpenses">Total Expenses in CAD: $0.00</div>
<div class="totals" id="daysTotal">Days Total (800 CAD/day): $0.00</div>
<div class="totals" id="grandTotal">Grand Total in CAD: $0.00</div>

<div id="receiptModal" onclick="closeReceipt()">
<img id="receiptFull">
</div>

<script>
const FX_MARKUP = 1.035; // TD Visa 3.5% FX markup
let totalCAD=0;
let totalDaysCAD=0;
let expenses=[];

async function getHistoricalRate(currency,date){
    if(currency==="CAD") return 1;
    try{
        const response = await fetch(`https://api.frankfurter.app/${date}?from=${currency}&to=CAD`);
        const data = await response.json();
        if(data && data.rates && data.rates.CAD){
            return data.rates.CAD;
        }else{
            alert("Exchange rate not available for that date.");
            return null;
        }
    }catch(e){
        console.log(e);
        alert("Could not fetch exchange rate.");
        return null;
    }
}

function saveExpenses(){ sessionStorage.setItem("expenses",JSON.stringify(expenses)); }

function loadExpenses(){
    const saved=sessionStorage.getItem("expenses");
    if(saved){
        expenses=JSON.parse(saved);
        expenses.forEach(exp=>{
            addRow(exp);
            totalCAD+=exp.amountCAD;
        });
        document.getElementById("totalExpenses").innerText="Total Expenses in CAD: $"+totalCAD.toFixed(2);
    }
}

async function addExpense(){
    const trip=document.getElementById("trip").value.trim();
    const date=document.getElementById("date").value;
    const desc=document.getElementById("desc").value.trim();
    const amount=parseFloat(document.getElementById("amount").value);
    const currency=document.getElementById("currency").value;
    const receiptFile=document.getElementById("receipt").files[0];

    if(!trip||!desc||!date||isNaN(amount)){
        alert("Please enter trip number, date, description and amount.");
        return;
    }

    let baseRate = await getHistoricalRate(currency,date);
    if(baseRate===null) return;

    const rateWithMarkup = baseRate * FX_MARKUP;
    const amountCAD = amount * rateWithMarkup;

    let receiptData = null;
    if(receiptFile){
        receiptData = await new Promise(resolve=>{
            const reader=new FileReader();
            reader.onload=e=>{
                const img=new Image();
                img.onload=()=>{
                    const canvas=document.createElement("canvas");
                    const ctx=canvas.getContext("2d");
                    const maxSize=1000;
                    let w=img.width;
                    let h=img.height;
                    if(w>maxSize){h=h*(maxSize/w);w=maxSize;}
                    if(h>maxSize){w=w*(maxSize/h);h=maxSize;}
                    canvas.width=w; canvas.height=h;
                    ctx.drawImage(img,0,0,w,h);
                    resolve(canvas.toDataURL("image/jpeg",0.7));
                };
                img.src=e.target.result;
            };
            reader.readAsDataURL(receiptFile);
        });
    }

    const expense={
        trip,
        date,
        desc,
        amount,
        currency,
        baseRate,
        rateWithMarkup,
        amountCAD,
        receipt: receiptData
    };

    expenses.push(expense);
    addRow(expense);
    totalCAD+=amountCAD;
    document.getElementById("totalExpenses").innerText="Total Expenses in CAD: $"+totalCAD.toFixed(2);
    updateGrandTotal();
    saveExpenses();

    document.getElementById("desc").value="";
    document.getElementById("amount").value="";
    document.getElementById("receipt").value="";
}

function addRow(exp){
    const index=expenses.indexOf(exp);
    const preview=exp.receipt ? `<img src="${exp.receipt}" class="receipt-preview" onclick="viewReceipt('${exp.receipt}')">` : "";
    const row=`<tr>
<td>${exp.trip}</td>
<td>${exp.date}</td>
<td>${exp.desc}</td>
<td>${exp.amount.toFixed(2)}</td>
<td>${exp.currency}</td>
<td>${exp.baseRate.toFixed(4)}</td>
<td>${exp.rateWithMarkup.toFixed(4)}</td>
<td>${exp.amountCAD.toFixed(2)}</td>
<td>${preview}</td>
<td><button class="delete-btn" onclick="deleteExpense(${index})">Delete</button></td>
</tr>`;
    document.getElementById("expenseTable").innerHTML+=row;
}

function deleteExpense(i){
    totalCAD-=expenses[i].amountCAD;
    expenses.splice(i,1);
    saveExpenses();
    location.reload();
}

function viewReceipt(src){
    document.getElementById("receiptFull").src=src;
    document.getElementById("receiptModal").style.display="flex";
}

function closeReceipt(){document.getElementById("receiptModal").style.display="none";}

function updateDaysTotal(){
    const days=parseFloat(document.getElementById("days").value)||0;
    totalDaysCAD=days*800;
    document.getElementById("daysTotal").innerText="Days Total (800 CAD/day): $"+totalDaysCAD.toFixed(2);
    updateGrandTotal();
}

function updateGrandTotal(){
    const grandTotal=totalCAD+totalDaysCAD;
    document.getElementById("grandTotal").innerText="Grand Total in CAD: $"+grandTotal.toFixed(2);
}

async function exportToPDF(){
    const doc=new window.jspdf.jsPDF();
    let y=10;
    doc.setFontSize(16);
    doc.text("Expense Report",10,y); y+=10;

    const days=parseFloat(document.getElementById("days").value)||0;
    doc.setFontSize(12);
    doc.text(`Number of Days: ${days}`,10,y); y+=10;

    for(let exp of expenses){
        doc.text(`Trip: ${exp.trip}`,10,y); y+=6;
        doc.text(`Date: ${exp.date}`,10,y); y+=6;
        doc.text(`Description: ${exp.desc}`,10,y); y+=6;
        doc.text(`Amount: ${exp.amount} ${exp.currency}`,10,y); y+=6;
        doc.text(`Base Rate: ${exp.baseRate.toFixed(4)}`,10,y); y+=6;
        doc.text(`Rate with Markup: ${exp.rateWithMarkup.toFixed(4)}`,10,y); y+=6;
        doc.text(`CAD: ${exp.amountCAD.toFixed(2)}`,10,y); y+=8;

        if(exp.receipt){
            const img=new Image(); img.src=exp.receipt; await new Promise(resolve=>img.onload=resolve);
            let w=img.width, h=img.height;
            const maxW=120, maxH=120;
            if(w>maxW){h=h*(maxW/w); w=maxW;}
            if(h>maxH){w=w*(maxH/h); h=maxH;}
            doc.addImage(exp.receipt,"JPEG",10,y,w,h);
            y+=h+5;
        }

        if(y>250){doc.addPage(); y=10;}
    }

    doc.text(`Total Expenses CAD: ${totalCAD.toFixed(2)}`,10,y+10);
    doc.text(`Days Total (${days} days x 800 CAD/day): ${totalDaysCAD.toFixed(2)}`,10,y+20);
    doc.text(`Grand Total: ${(totalCAD+totalDaysCAD).toFixed(2)}`,10,y+30);
    doc.save("Expenses_Report.pdf");
}

window.onload=function(){
    loadExpenses();
    const today=new Date().toISOString().split("T")[0];
    document.getElementById("date").value=today;
    document.getElementById("date").max=today;
};
</script>
</body>
</html>
